name: toolbox

on:
  workflow_dispatch:

jobs:

  prepare:
    runs-on: ubuntu-latest

    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - id:  prepare
        run: |
          PKGS='dufs, sysinfo, jq, yq, gh, gn, gm4, grep, gsed, gzip, gtar, gmake, gperf, getopt, yasm, nasm, ninja, scdoc, doxygen, ffmpeg, sqlite3, unzip, xz, tic, xxd, bsdtar, curl, tree, d2, dot_static, fzf, bat, findutils, coreutils, bash, patch, patchelf, pkg-config, pkgconf, flex, bison'
          printf 'PKGS=[ %s ]\n' "$PKGS" >> "$GITHUB_OUTPUT"

    outputs:
      pkgs: ${{ steps.prepare.outputs.PKGS }}


  dragonflybsd:
    needs: [prepare]

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        version: ['6.4']
        profile: [debug, release]
        pkg: ${{ needs.prepare.outputs.pkgs }}

    steps:
      - run: curl -LO https://github.com/leleliu008/uppm-package-repository-dragonflybsd-6.4-x86_64/releases/download/2023.12.04/curl-8.3.0-dragonflybsd-6.4-x86_64.tar.xz
      - run: tar xvf curl-8.3.0-dragonflybsd-6.4-x86_64.tar.xz --strip-components=1
      - run: rm -rf include/ lib/ share/

      - uses: vmactions/dragonflybsd-vm@v1
        with:
          release: "${{ matrix.version }}.0"
          usesh: true
          sync: rsync
          copyback: true
          run: |
            run() {
              printf "\033[0;35m==>\033[0m \033[0;32m%b\n\033[0m" "$*"
              eval "$@"
            }

            set -e

            export PATH="$PWD/bin:$PATH"

            # I have no idea why curl can not be installed via pkg
            #run pkg install -y curl libnghttp2 gcc

            run curl -LO https://raw.githubusercontent.com/leleliu008/ppkg/master/ppkg
            run chmod a+x ppkg

            run ./ppkg setup
            run ./ppkg update
            run ./ppkg install dragonflybsd-${{ matrix.version }}-x86_64/${{ matrix.pkg }} --static --profile=${{ matrix.profile }}
            run ./ppkg bundle  dragonflybsd-${{ matrix.version }}-x86_64/${{ matrix.pkg }} .tar.xz

      - uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.pkg }}---dragonflybsd-${{ matrix.version }}-x86_64-${{ matrix.profile }}.tar.xz
          path: ${{ matrix.pkg }}-*-dragonflybsd-${{ matrix.version }}-x86_64.${{ matrix.profile }}.tar.xz



  freebsd:
    needs: [prepare]

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        version: ['15.0', '14.3', '14.2', '14.1', '14.0', '13.5', '13.4', '13.3', '13.2']
        profile: [debug, release]
        pkg: ${{ needs.prepare.outputs.pkgs }}

    steps:
      - uses: actions/checkout@v6

      - uses: cross-platform-actions/action@master
        with:
          operating_system: freebsd
          version: ${{ matrix.version }}
          shell: bash
          run: |
            run() {
              printf "\033[0;35m==>\033[0m \033[0;32m%b\n\033[0m" "$*"
              eval "$@"
            }

            run sudo pkg install -y curl

            run curl -LO https://raw.githubusercontent.com/leleliu008/ppkg/master/ppkg
            run chmod a+x ppkg

            run ./ppkg setup --syspm
            run ./ppkg update
            run ./ppkg install freebsd-${{ matrix.version }}-amd64/${{ matrix.pkg }} --static --profile=${{ matrix.profile }}
            run ./ppkg bundle  freebsd-${{ matrix.version }}-amd64/${{ matrix.pkg }} .tar.xz

      - uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.pkg }}---freebsd-${{ matrix.version }}-amd64-${{ matrix.profile }}.tar.xz
          path: ${{ matrix.pkg }}-*-freebsd-${{ matrix.version }}-amd64.${{ matrix.profile }}.tar.xz



  openbsd:
    needs: [prepare]

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        version: ['7.8', '7.7', '7.6', '7.5', '7.4', '7.3', '7.2']
        profile: [debug, release]
        pkg: ${{ needs.prepare.outputs.pkgs }}

    steps:
      - uses: actions/checkout@v6

      - uses: cross-platform-actions/action@master
        with:
          operating_system: openbsd
          version: ${{ matrix.version }}
          shell: bash
          run: |
            run() {
              printf "\033[0;35m==>\033[0m \033[0;32m%b\n\033[0m" "$*"
              eval "$@"
            }

            run sudo pkg_add curl

            run curl -LO https://raw.githubusercontent.com/leleliu008/ppkg/master/ppkg
            run chmod a+x ppkg

            run ./ppkg setup --syspm
            run ./ppkg update
            run ./ppkg install openbsd-${{ matrix.version }}-amd64/${{ matrix.pkg }} --profile=${{ matrix.profile }}
            run ./ppkg bundle  openbsd-${{ matrix.version }}-amd64/${{ matrix.pkg }} .tar.xz

      - uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.pkg }}---openbsd-${{ matrix.version }}-amd64-${{ matrix.profile }}.tar.xz
          path: ${{ matrix.pkg }}-*-openbsd-${{ matrix.version }}-amd64.${{ matrix.profile }}.tar.xz



  netbsd:
    needs: [prepare]

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        version: ['10.1', '10.0', '9.4', '9.3', '9.2']
        profile: [debug, release]
        pkg: ${{ needs.prepare.outputs.pkgs }}

    steps:
      - uses: actions/checkout@v6

      - uses: cross-platform-actions/action@master
        with:
          operating_system: netbsd
          version: ${{ matrix.version }}
          shell: bash
          run: |
            run() {
              printf "\033[0;35m==>\033[0m \033[0;32m%b\n\033[0m" "$*"
              eval "$@"
            }

            run sudo pkgin -y install curl

            run curl -LO -k https://curl.se/ca/cacert.pem

            run export SSL_CERT_FILE="$PWD/cacert.pem"

            run curl -LO https://raw.githubusercontent.com/leleliu008/ppkg/master/ppkg
            run chmod a+x ppkg

            run ./ppkg setup --syspm
            run ./ppkg update
            run ./ppkg install netbsd-${{ matrix.version }}-amd64/${{ matrix.pkg }} --static --profile=${{ matrix.profile }}
            run ./ppkg bundle  netbsd-${{ matrix.version }}-amd64/${{ matrix.pkg }} .tar.xz

      - uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.pkg }}---netbsd-${{ matrix.version }}-amd64-${{ matrix.profile }}.tar.xz
          path: ${{ matrix.pkg }}-*-netbsd-${{ matrix.version }}-amd64.${{ matrix.profile }}.tar.xz


  macos:
    needs: prepare

    runs-on: macos-26

    strategy:
      fail-fast: false
      matrix:
        target-version: ['10.15', '11.0', '12.0', '13.0', '14.0', '15.0', "26.0"]
        target-arch: [x86_64, arm64]
        profile: [debug, release]
        pkg: ${{ needs.prepare.outputs.pkgs }}

    steps:
      - run: curl -LO https://raw.githubusercontent.com/leleliu008/ppkg/master/ppkg
      - run: chmod a+x ppkg

      - run: ./ppkg setup
      - run: ./ppkg update
      - run: ./ppkg install macos-${{ matrix.target-version }}-${{ matrix.target-arch }}/${{ matrix.pkg }} --profile=${{ matrix.profile }}
      - run: ./ppkg bundle  macos-${{ matrix.target-version }}-${{ matrix.target-arch }}/${{ matrix.pkg }} .tar.xz

      - uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.pkg }}-macos-${{ matrix.target-version }}-${{ matrix.target-arch }}.${{ matrix.profile }}.tar.xz
          path: ${{ matrix.pkg }}-macos-${{ matrix.target-version }}-${{ matrix.target-arch }}.${{ matrix.profile }}.tar.xz


  linux:
    needs: [prepare]

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        target-arch: [loongarch64, x86_64, aarch64, ppc64le, riscv64, s390x]
        profile: [debug, release]
        pkg: ${{ needs.prepare.outputs.pkgs }}

    steps:
      - run: |
          cat > run.sh <<EOF
          set -ex

          COLOR_GREEN='\033[0;32m'        # Green
          COLOR_PURPLE='\033[0;35m'       # Purple
          COLOR_OFF='\033[0m'             # Reset

          echo() {
              printf '%b\n' "\$*"
          }

          run() {
              echo "\${COLOR_PURPLE}==>\${COLOR_OFF} \${COLOR_GREEN}\$@\${COLOR_OFF}"
              eval "\$*"
          }

          ########################################################################

          run uname -a
          run id
          run pwd

          export GITHUB_ACTIONS=true

          ########################################################################

          run wget https://raw.githubusercontent.com/leleliu008/ppkg/master/ppkg
          run chmod a+x ppkg

          run ./ppkg setup
          run ./ppkg update
          run ./ppkg install ${{ matrix.pkg }} --static --profile=${{ matrix.profile }}
          run ./ppkg bundle  ${{ matrix.pkg }} .tar.xz
          EOF

      - run: curl -LO https://raw.githubusercontent.com/alpinelinux/alpine-chroot-install/master/alpine-chroot-install
      - run: chmod +x alpine-chroot-install
      - run: sudo ./alpine-chroot-install -d /alpine -a ${{ matrix.target-arch }} -p wget -p g++
      - run: /alpine/enter-chroot sh run.sh
      - run: /alpine/destroy

      - run: ls

      - uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.pkg }}---linux-${{ matrix.target-arch }}.${{ matrix.profile }}.tar.xz
          path: ${{ matrix.pkg }}-*-linux-${{ matrix.target-arch }}.${{ matrix.profile }}.tar.xz


  android:
    needs: prepare

    runs-on: ubuntu-latest

    container: ubuntu:24.04

    strategy:
      fail-fast: false
      matrix:
        profile: [debug, release]
        pkg: ${{ needs.prepare.outputs.pkgs }}

    steps:
      - run: apt -y update
      - run: apt -y install curl

      - run: curl -LO https://raw.githubusercontent.com/leleliu008/ndk-pkg/master/ndk-pkg
      - run: chmod +x ndk-pkg

      - run: ./ndk-pkg about
      - run: ./ndk-pkg setup
      - run: ./ndk-pkg update
      - run: ./ndk-pkg install android-35-arm64-v8a,armeabi-v7a,x86_64,x86/${{ matrix.pkg }} --static --profile=${{ matrix.profile }}

      - run: ./ndk-pkg bundle  android-35-arm64-v8a/${{ matrix.pkg }}   .tar.xz
      - run: ./ndk-pkg bundle  android-35-armeabi-v7a/${{ matrix.pkg }} .tar.xz
      - run: ./ndk-pkg bundle  android-35-x86_64/${{ matrix.pkg }}      .tar.xz
      - run: ./ndk-pkg bundle  android-35-x86/${{ matrix.pkg }}         .tar.xz

      - uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.pkg }}---android-${{ matrix.profile }}
          path: ${{ matrix.pkg }}-*-android-*.tar.xz


  publish:
    needs: [prepare, dragonflybsd, freebsd, openbsd, netbsd, macos, linux, android]

    runs-on: ubuntu-latest

    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: '*'
          path: .
          merge-multiple: true

      - run: ls -a

      - name: unpack
        run: |
          set -x

          for f in *.tar.xz
          do
              tar xvf "$f" -C "$DIR_NAME" --strip-components=1
          done

      # to avaid: failed to run git: fatal: not a git repository (or any of the parent directories): .git
      - run: git -c init.defaultBranch=master init
      - run: git remote add origin ${{ github.repositoryUrl }}

      - id: tagname
        run: printf 'tagname=%s\n' "$(date +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - run: gh release create ${{ steps.tagname.outputs.tagname }} *.tar.xz --title ${{ steps.tagname.outputs.tagname }} --notes ${{ steps.tagname.outputs.tagname }}
