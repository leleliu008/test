name: env test

on:
  workflow_dispatch:

jobs:
  test:

    strategy:
      fail-fast: false
      matrix:
        runner: [macos-15, ubuntu-26.04]

    runs-on: ${{ matrix.runner }}

    steps:
      - name: setup Android NDK build environment
        run: |
          TOOLCHAIN_BASE_DIR=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/darwin-x86_64
          TOOLCHAIN_BIN_DIR=$TOOLCHAIN_BASE_DIR/bin
          SYSROOT=$TOOLCHAIN_BASE_DIR/sysroot

          cat >> "$GITHUB_ENV" <<EOF
          CC=$TOOLCHAIN_BIN_DIR/aarch64-linux-android24-clang
          AR=$TOOLCHAIN_BIN_DIR/llvm-ar
          RANLIB=$TOOLCHAIN_BIN_DIR/llvm-ranlib
          CFLAGS="--sysroot $SYSROOT -Qunused-arguments -Os -fpic"
          CPPFLAGS="--sysroot $SYSROOT -Qunused-arguments"
          LDFLAGS="--sysroot $SYSROOT"
          EOF

      - run: export -p
