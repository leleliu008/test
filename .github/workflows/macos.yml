name: macOS

on:
  workflow_dispatch:

jobs:
  test:

    strategy:
      fail-fast: false
      matrix:
        version: [14]
        arch: [x86_64, arm64]
        include:
          - arch: x86_64
            xxxx: -large
          - arch: arm64
            xxxx: ''

    runs-on: macos-${{ matrix.version }}${{ matrix.xxxx }}

    steps:
      - run: curl -LO https://curl.se/ca/cacert.pem
      - run: echo "SSL_CERT_FILE=$PWD/cacert.pem" >> "$GITHUB_ENV"

      - run: curl -LO https://github.com/leleliu008/ndk-pkg/releases/download/ndk-pkg-core-2024.05.15/ndk-pkg-core-2024.05.15-macos-${{ matrix.version }}.0-${{ matrix.arch }}.tar.xz
      - run: tar vxf ndk-pkg-core-2024.05.15-macos-${{ matrix.version }}.0-${{ matrix.arch }}.tar.xz --strip-components=1

      - run: ./uppm update

      - run: ls ~/.uppm/repos.d/official-core/formula/

      - run: ./uppm install docbook-xsl
